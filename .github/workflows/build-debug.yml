name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Không commit gradle-wrapper.jar (binary) trong repo này. Dùng action chính chủ của Gradle
      # để cấp phát đúng bản Gradle 9.1.0 (bản AGP 9.1.1 yêu cầu tối thiểu) trực tiếp trên runner.
      - name: Set up Gradle 9.1.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'
          # Yêu cầu bắt buộc của dự án: mọi dependency tải mới hoàn toàn mỗi lần build,
          # không dùng cache giữa các lần chạy CI.
          cache-disabled: true

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon --warning-mode=all

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "Không tìm thấy file APK sau khi build." >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yunphim-debug-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 14
