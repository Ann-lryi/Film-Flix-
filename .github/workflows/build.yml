name: Build NguoncFlix Debug APK (CI/CD Only)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # === CRITICAL FIX FOR "chmod: cannot access 'gradlew'" ===
      # This is the most common reason for this exact error.
      - name: Verify & Prepare Gradle Wrapper
        run: |
          echo "🔍 Checking Gradle wrapper files..."
          
          if [ ! -f "./gradlew" ]; then
            echo "❌ FATAL: gradlew not found after checkout!"
            echo "The Gradle wrapper files must be committed to the repo."
            echo ""
            echo "FIX (run these commands locally):"
            echo "  git add -f gradlew gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties"
            echo "  git commit -m \"fix: include gradle wrapper for CI\""
            echo "  git push"
            echo ""
            exit 1
          fi
          
          echo "✅ gradlew exists"
          
          # Always make it executable (safe even if already executable)
          chmod +x ./gradlew
          echo "✅ chmod +x gradlew completed"
          
          ls -lh ./gradlew gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nguonc-flix-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nguonc-flix-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Verify APK
        run: |
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          file app/build/outputs/apk/debug/app-debug.apk
