name: Build NguoncFlix Debug APK (CI/CD Only)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ============================================================
      # SUPER ROBUST GRADLE WRAPPER - AUTO DOWNLOAD IF MISSING
      # This solves the "gradlew not found" error permanently.
      # ============================================================
      - name: Ensure Gradle Wrapper (with auto-download fallback)
        run: |
          echo "🔍 Checking Gradle wrapper files..."
          
          if [ ! -f "./gradlew" ]; then
            echo "⚠️ gradlew missing after checkout. Auto-downloading fresh Gradle wrapper..."
            
            # Download official Gradle wrapper files
            curl -fL -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew || {
              echo "Failed to download gradlew script"
              exit 1
            }
            
            mkdir -p gradle/wrapper
            
            curl -fL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar || {
              echo "Failed to download gradle-wrapper.jar"
              exit 1
            }
            
            curl -fL -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties || {
              echo "Failed to download gradle-wrapper.properties"
              exit 1
            }
            
            echo "✅ Gradle wrapper successfully downloaded as fallback"
          else
            echo "✅ gradlew already present in repository"
          fi
          
          # Critical: Make executable
          chmod +x ./gradlew
          echo "✅ chmod +x gradlew completed"
          
          # Verify files
          ls -lh gradlew gradle/wrapper/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nguonc-flix-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Verify built APK
        run: |
          echo "=== Build Success ==="
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          file app/build/outputs/apk/debug/app-debug.apk
